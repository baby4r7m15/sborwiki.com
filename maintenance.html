<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>sborwiki - Uh oh!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" sizes="512x512" href="/logo.png" />
<link rel="apple-touch-icon" href="/logo.png" />
<meta name="theme-color" content="#0b1220" id="themeColorMeta" />

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap");

*{ margin:0; padding:0; box-sizing:border-box; }

/* =========================
   HUD ROOT (YOUR SITE THEME)
========================= */
:root{
  --bg1:#0b1220;
  --panel:rgba(10,18,32,.78);
  --panel2:rgba(10,18,32,.55);

  --line:rgba(0,234,255,.25);
  --line2:rgba(0,234,255,.12);

  --cyan:#00eaff;
  --cyan-soft:#7ef9ff;

  --text:#e6f7ff;
  --muted:rgba(200,230,255,.65);
}

/* =========================
   BACKGROUND
========================= */
body{
  font-family:"Montserrat",sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:var(--text);

  background:
    radial-gradient(circle at 20% 20%, rgba(0,234,255,.15), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(0,150,255,.12), transparent 25%),
    radial-gradient(circle at top, rgba(255,255,255,.05), transparent 40%),
    linear-gradient(var(--bg1), var(--bg1)),
    url("/css/background2.jpg") center / cover no-repeat;
}

@media (min-width:1025px){
  body{ background-attachment: fixed; }
}

/* =========================
   SPARKLES (HUD STYLE)
========================= */
.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(0,234,255,.9) 1px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,.6) 1px, transparent 2px);
  background-size:140px 140px, 180px 180px;
  animation: float 14s linear infinite;
  opacity:.25;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-30px); }
  100%{ transform:translateY(0); }
}

/* =========================
   HUD PANEL CARD
========================= */
.card{
  position:relative;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:42px 34px;
  width:min(420px,90%);
  text-align:center;
  backdrop-filter:blur(18px);

  box-shadow:
    0 0 0 1px var(--line2),
    0 20px 60px rgba(0,0,0,.5),
    0 0 40px rgba(0,234,255,.08);
}

/* subtle scan glow */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(120deg,transparent,rgba(0,234,255,.15),transparent);
  opacity:.25;
  pointer-events:none;
}

/* =========================
   TEXT
========================= */
.title{
  font-weight:800;
  letter-spacing:.18em;
  font-size:1.4rem;
  color:var(--cyan);
  text-shadow:0 0 18px rgba(0,234,255,.7);
}

.subtitle{
  margin-top:8px;
  font-size:.75rem;
  letter-spacing:.25em;
  color:var(--muted);
}

.status{
  margin-top:26px;
  font-size:.9rem;
  font-weight:600;
  color:var(--text);
}

.status span{
  color:var(--cyan-soft);
}

/* =========================
   🐾 PUPPY LOADER (UPGRADED)
========================= */
.puppy-loader{
  position: relative;
  width: 132px;
  height: 132px;
  margin: 26px auto 0;
  display:flex;
  align-items:center;
  justify-content:center;
  animation: puppyFloat 3s ease-in-out infinite;
}

/* glow ring */
.puppy-loader::before{
  content:"";
  position:absolute;
  width:140px;
  height:140px;
  border-radius:50%;
  border:1px solid rgba(0,234,255,.25);
  box-shadow:
    0 0 25px rgba(0,234,255,.35),
    inset 0 0 20px rgba(0,234,255,.2);
  animation: pulseRing 2.5s infinite ease-in-out;
}

@keyframes pulseRing{
  0%,100%{ transform:scale(1); opacity:.7; }
  50%{ transform:scale(1.08); opacity:1; }
}

.puppy-face{
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius:50%;
  border:2px solid var(--line);
  box-shadow:
    0 10px 30px rgba(0,234,255,.2),
    0 0 20px rgba(255,255,255,.15);
}

@keyframes puppyFloat{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(-6px); }
}

/* =========================
   MESSAGE
========================= */
.msg{
  margin-top:20px;
  font-size:.85rem;
  color:var(--muted);
}

/* =========================
   HEART
========================= */
.heart{
  margin-top:12px;
  font-size:1.3rem;
  color:var(--cyan);
  animation: pulse 1.6s infinite;
  text-shadow:0 0 12px rgba(0,234,255,.6);
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.2); }
}
</style>
</head>

<body>
<div class="sparkles"></div>

<div class="card">
  <div class="title">SBO:R WIKI</div>
  <div class="subtitle">SYSTEM: MAINTENANCE</div>

  <div class="status">
    please wait… <span>generating logs...</span>
  </div>

  <div class="puppy-loader">
    <img src="/logo.png" class="puppy-face" />
  </div>

  <div class="msg" id="msg">
    Please wait while the system stabilizes.
  </div>

  <div class="heart">♡</div>
</div>
</body>
</html>
